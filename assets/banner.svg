<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <!-- Dynamic Shifting Gradient -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0b21">
        <animate attributeName="stop-color" values="#0d0b21;#1b0b2e;#0d0b21" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#150e3a">
        <animate attributeName="stop-color" values="#150e3a;#08253f;#150e3a" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#071b26">
        <animate attributeName="stop-color" values="#071b26;#0a0f1d;#071b26" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#0000ff">
        <animate attributeName="stop-color" values="#0000ff;#f355da;#00f2fe" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#cyber-grad)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.12">
    <path d="M 0,30 L 800,30 M 0,60 L 800,60 M 0,90 L 800,90 M 0,120 L 800,120 M 0,150 L 800,150 M 0,180 L 800,180 M 0,210 L 800,210 M 0,240 L 800,240 M 0,270 L 800,270" stroke="#00f2fe" stroke-width="1" />
    <path d="M 80,0 L 80,300 M 160,0 L 160,300 M 240,0 L 240,300 M 320,0 L 320,300 M 400,0 L 400,300 M 480,0 L 480,300 M 560,0 L 560,300 M 640,0 L 640,300 M 720,0 L 720,300" stroke="#00f2fe" stroke-width="1" />
  </g>

  <!-- Abstract Animated Neural Nodes -->
  <g stroke="#00f2fe" stroke-opacity="0.3" stroke-width="1.5">
    <line x1="120" y1="80" x2="220" y2="150" />
    <line x1="220" y1="150" x2="180" y2="230" />
    <line x1="180" y1="230" x2="120" y2="80" />
    <line x1="220" y1="150" x2="340" y2="120" />
    
    <line x1="680" y1="220" x2="580" y2="150" />
    <line x1="580" y1="150" x2="620" y2="70" />
    <line x1="620" y1="70" x2="680" y2="220" />
    <line x1="580" y1="150" x2="460" y2="180" />
  </g>

  <g filter="url(#glow)">
    <circle cx="120" cy="80" r="6" fill="#00f2fe">
      <animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="220" cy="150" r="8" fill="#f355da">
      <animate attributeName="r" values="8;5;8" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="180" cy="230" r="5" fill="#00f2fe">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="340" cy="120" r="7" fill="#ffb800">
      <animate attributeName="r" values="7;10;7" dur="5.5s" repeatCount="indefinite" />
    </circle>

    <circle cx="680" cy="220" r="6" fill="#00f2fe">
      <animate attributeName="r" values="6;9;6" dur="3.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="580" cy="150" r="8" fill="#f355da">
      <animate attributeName="r" values="8;5;8" dur="4.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="620" cy="70" r="5" fill="#ffb800">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="460" cy="180" r="7" fill="#00f2fe">
      <animate attributeName="r" values="7;11;7" dur="5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Typography -->
  <g text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <!-- Title -->
    <text x="400" y="145" font-size="54" font-weight="900" fill="url(#text-grad)" letter-spacing="4" filter="url(#glow)">AWESOME GPTs</text>
    <!-- Subtitle -->
    <text x="400" y="195" font-size="18" font-weight="400" fill="#a0aec0" letter-spacing="2">
      History, Progression, Variants, &amp; Applications
    </text>
  </g>

  <!-- Dynamic HUD border -->
  <rect x="15" y="15" width="770" height="270" fill="none" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1.5" rx="8" />
  <path d="M 10 30 L 10 10 L 30 10 M 790 30 L 790 10 L 770 10 M 10 270 L 10 290 L 30 290 M 790 270 L 790 290 L 770 290" fill="none" stroke="#00f2fe" stroke-opacity="0.8" stroke-width="2.5" />
</svg>
